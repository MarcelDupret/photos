<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Marcel Dupret</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1A3A1A 0%, #0A1A0A 60%, #0D0D0D 100%);
        }

        .btn-voltar {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(76, 175, 80, 0.2);
            color: #fff;
            border: 1px solid rgba(76, 175, 80, 0.45);
            padding: 10px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .btn-voltar:hover {
            background: rgba(76, 175, 80, 0.4);
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(46, 125, 50, 0.3);
        }

        .album-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 100;
        }

        .gallery-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 80px 20px 20px;
        }

        .main-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s ease;
            cursor: zoom-in;
        }

        .main-image.loading {
            opacity: 0.3;
        }

        .main-image.zoomable {
            cursor: grab;
        }

        .main-image.zoomable:active {
            cursor: grabbing;
        }

        .image-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
        }

        .nav-hint {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-hint kbd {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 0.7rem;
        }

        .thumbs-section {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0 40px;
        }

        .swiper {
            width: 100%;
            padding: 10px 0;
        }

        .swiper-slide {
            width: 90px;
            height: 90px;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.3s, border 0.3s;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
        }

        .swiper-slide-thumb-active {
            opacity: 1;
            border: 3px solid #4CAF50;
            transform: scale(1.1);
            z-index: 10;
        }

        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .swiper-slide {
                width: 70px;
                height: 70px;
            }

            .gallery-container {
                padding: 70px 15px 15px;
            }

            .nav-hint {
                display: none;
            }
        }
    </style>
</head>

<body>

    <a href="index.html" class="btn-voltar" id="btn-voltar">← Voltar</a>
    <span class="album-title" id="album-title">Álbum</span>

    <div class="gallery-container">
        <div class="main-image-wrapper" id="main-image-wrapper">
            <img class="main-image" id="main-image" src="" alt="Imagem principal" />
            <div class="image-info" id="image-info"></div>
            <div class="nav-hint">
                <kbd>←</kbd> <span>Anterior</span> <kbd>→</kbd> <span>Próxima</span> • <kbd>Scroll</kbd>
                <span>Zoom</span>
            </div>
        </div>
        <div class="thumbs-section">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="gallery-thumbs"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nomeAlbum = urlParams.get('album') || 'Lua';
        const fotoInicial = parseInt(urlParams.get('foto')) || 0;
        const paginaVoltar = urlParams.get('pagina') || '1';

        document.getElementById('album-title').textContent = nomeAlbum;
        document.getElementById('btn-voltar').href = `index.html?pagina=${paginaVoltar}`;

        fetch(`albuns/${nomeAlbum}.json`)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(imagens => {
                inicializarGaleria(imagens, fotoInicial);
            })
            .catch(err => {
                console.error("Erro:", err);
                document.getElementById('gallery-thumbs').innerHTML =
                    `<div style="color:#ff6b6b;text-align:center;padding:40px;">
                        <p>Erro ao carregar álbum "${nomeAlbum}": ${err.message}</p>
                    </div>`;
            });

        function inicializarGaleria(imagens, indexInicial) {
            const containerThumbs = document.getElementById('gallery-thumbs');
            const mainImage = document.getElementById('main-image');
            const imageInfo = document.getElementById('image-info');
            const mainWrapper = document.getElementById('main-image-wrapper');

            let currentIndex = indexInicial;
            let isZoomed = false;
            let zoomLevel = 1;
            let panX = 0, panY = 0;
            let isPanning = false;
            let startX = 0, startY = 0;

            imagens.forEach((img, i) => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `<img src="${img.thumb}" alt="${img.title || ''}" data-index="${i}">`;
                containerThumbs.appendChild(slide);
            });

            const swiper = new Swiper(".mySwiper", {
                spaceBetween: 10,
                slidesPerView: "auto",
                freeMode: true,
                watchSlidesProgress: true,
                centeredSlides: true
            });

            function updateMainImage(index) {
                if (index < 0 || index >= imagens.length) return;

                currentIndex = index;
                const img = imagens[index];

                mainImage.classList.add('loading');
                mainImage.src = img.src;
                imageInfo.textContent = img.title || '';

                // Reset zoom/pan
                zoomLevel = 1;
                panX = 0;
                panY = 0;
                isZoomed = false;
                mainImage.style.transform = 'translate(0, 0) scale(1)';
                mainImage.classList.remove('zoomable');

                mainImage.onload = () => mainImage.classList.remove('loading');
                mainImage.onerror = () => mainImage.classList.remove('loading');

                swiper.slideTo(index);
                updateActiveThumb(index);
            }

            function updateActiveThumb(index) {
                document.querySelectorAll('.swiper-slide').forEach((slide, i) => {
                    slide.classList.toggle('swiper-slide-thumb-active', i === index);
                });
            }

            function navigate(delta) {
                const newIndex = (currentIndex + delta + imagens.length) % imagens.length;
                updateMainImage(newIndex);
            }

            // Click thumbnail
            containerThumbs.addEventListener('click', (e) => {
                const slide = e.target.closest('.swiper-slide');
                if (!slide) return;
                const idx = parseInt(slide.querySelector('img').getAttribute('data-index'));
                updateMainImage(idx);
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === 'ArrowLeft') navigate(-1);
                else if (e.key === 'ArrowRight') navigate(1);
            });

            // Wheel zoom
            mainWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.ctrlKey || e.metaKey) {
                    // Zoom with Ctrl+wheel
                    const delta = e.deltaY > 0 ? -0.1 : 0.1;
                    zoomLevel = Math.max(0.5, Math.min(5, zoomLevel + delta));
                    applyTransform();
                    isZoomed = zoomLevel > 1;
                    mainImage.classList.toggle('zoomable', isZoomed);
                } else if (isZoomed) {
                    // Pan with wheel when zoomed
                    panX -= e.deltaX;
                    panY -= e.deltaY;
                    applyTransform();
                }
            }, { passive: false });

            // Drag to pan when zoomed
            mainImage.addEventListener('mousedown', (e) => {
                if (!isZoomed) return;
                isPanning = true;
                startX = e.clientX - panX;
                startY = e.clientY - panY;
                mainImage.style.cursor = 'grabbing';
                e.preventDefault();
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => {
                isPanning = false;
                mainImage.style.cursor = isZoomed ? 'grab' : 'zoom-in';
            });

            // Double-click to zoom in/out
            mainImage.addEventListener('dblclick', () => {
                if (isZoomed) {
                    zoomLevel = 1;
                    panX = 0;
                    panY = 0;
                    isZoomed = false;
                    mainImage.classList.remove('zoomable');
                } else {
                    zoomLevel = 2;
                    isZoomed = true;
                    mainImage.classList.add('zoomable');
                }
                applyTransform();
            });

            function applyTransform() {
                mainImage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
            }

            // Touch support for mobile
            let touchStartDist = 0;
            let touchStartZoom = 1;
            let lastTouchCenter = { x: 0, y: 0 };

            mainWrapper.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    // Pinch to zoom
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDist = Math.hypot(dx, dy);
                    touchStartZoom = zoomLevel;
                    lastTouchCenter = {
                        x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                        y: (e.touches[0].clientY + e.touches[1].clientY) / 2
                    };
                } else if (isZoomed && e.touches.length === 1) {
                    // Pan with one finger when zoomed
                    isPanning = true;
                    startX = e.touches[0].clientX - panX;
                    startY = e.touches[0].clientY - panY;
                }
            }, { passive: false });

            mainWrapper.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    // Pinch zoom
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.hypot(dx, dy);
                    zoomLevel = Math.max(0.5, Math.min(5, touchStartZoom * (dist / touchStartDist)));
                    isZoomed = zoomLevel > 1;
                    mainImage.classList.toggle('zoomable', isZoomed);
                    applyTransform();
                    e.preventDefault();
                } else if (isPanning && e.touches.length === 1) {
                    panX = e.touches[0].clientX - startX;
                    panY = e.touches[0].clientY - startY;
                    applyTransform();
                    e.preventDefault();
                }
            }, { passive: false });

            mainWrapper.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) {
                    isPanning = false;
                }
            });

            // Initialize
            updateMainImage(indexInicial);
        }
    </script>
</body>

</html>
