<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Marcel Dupret</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="galeria.css">
</head>

<body>

    <a href="index.html" class="btn-voltar" id="btn-voltar">← Voltar</a>
    <span class="album-title" id="album-title">Álbum</span>

    <div class="gallery-container">
        <div class="main-image-wrapper" id="main-image-wrapper">
            <img class="main-image" id="main-image" src="" alt="Imagem principal" />
            <div class="image-info" id="image-info"></div>
            <!-- <div class="nav-hint">
            //    <kbd>←</kbd> <span>Anterior</span> <kbd>→</kbd> <span>Próxima</span> • <kbd>Scroll</kbd>
            //    <span>Zoom</span>
            // </div> -->
        </div>
        <div class="thumbs-section">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="gallery-thumbs"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="galeria.js" defer></script>
</body>

</html>
