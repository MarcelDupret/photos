<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Marcel Dupret</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/photoswipe.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            margin: 0;
            background: #0D0D0D;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1A3A1A 0%, #0A1A0A 60%, #0D0D0D 100%);
        }
        .btn-voltar {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(76, 175, 80, 0.2);
            color: #fff;
            border: 1px solid rgba(76, 175, 80, 0.45);
            padding: 10px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .btn-voltar:hover {
            background: rgba(76, 175, 80, 0.4);
            border-color: #4CAF50;
            box-shadow: 0 0 15px rgba(46, 125, 50, 0.3);
        }
        .album-title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 100;
        }
        .gallery-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 80px 20px 20px;
        }
        .main-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: opacity 0.2s ease;
        }
        .main-image.loading {
            opacity: 0.3;
        }
        .image-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
        }
        .thumbs-section {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 0 40px;
        }
        .swiper {
            width: 100%;
            padding: 10px 0;
        }
        .swiper-slide {
            width: 90px;
            height: 90px;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.3s, border 0.3s;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
        }
        .swiper-slide-thumb-active {
            opacity: 1;
            border: 3px solid #4CAF50;
            transform: scale(1.1);
            z-index: 10;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }
        .pswp__bg {
            background: #0D0D0D;
        }
        @media (max-width: 600px) {
            .swiper-slide { width: 70px; height: 70px; }
            .gallery-container { padding: 70px 15px 15px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-voltar" id="btn-voltar">← Voltar ao Livro</a>
    <span class="album-title" id="album-title">Álbum</span>

    <div class="gallery-container">
        <div class="main-image-wrapper">
            <img class="main-image" id="main-image" src="" alt="Imagem principal" />
            <div class="image-info" id="image-info"></div>
        </div>
        <div class="thumbs-section">
            <div class="swiper mySwiper">
                <div class="swiper-wrapper" id="gallery-thumbs"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/umd/photoswipe-lightbox.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/photoswipe@5.4.4/dist/umd/photoswipe.umd.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nomeAlbum = urlParams.get('album') || 'Lua';
        const fotoInicial = parseInt(urlParams.get('foto')) || 0;
        const paginaVoltar = urlParams.get('pagina') || '1';

        document.getElementById('album-title').textContent = nomeAlbum;
        document.getElementById('btn-voltar').href = `index.html?pagina=${paginaVoltar}`;

        fetch(`albuns/${nomeAlbum}.json`)
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(imagens => {
                inicializarGaleria(imagens, fotoInicial);
            })
            .catch(err => {
                console.error("Erro:", err);
                document.getElementById('gallery-thumbs').innerHTML =
                    `<div style="color:#ff6b6b;text-align:center;padding:40px;">
                        <p>Erro ao carregar álbum "${nomeAlbum}": ${err.message}</p>
                    </div>`;
            });

        function inicializarGaleria(imagens, indexInicial) {
            const containerThumbs = document.getElementById('gallery-thumbs');
            const mainImage = document.getElementById('main-image');
            const imageInfo = document.getElementById('image-info');

            const imagensFundo = imagens.map(img => ({
                src: img.src,
                w: 1600,
                h: 1200,
                msrc: img.thumb,
                title: img.title || ''
            }));

            imagens.forEach((img, i) => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `<img src="${img.thumb}" alt="${img.title || ''}" data-index="${i}">`;
                containerThumbs.appendChild(slide);
            });

            const swiper = new Swiper(".mySwiper", {
                spaceBetween: 10,
                slidesPerView: "auto",
                freeMode: true,
                watchSlidesProgress: true,
                centeredSlides: true
            });

            const lightbox = new PhotoSwipeLightbox({
                dataSource: imagensFundo,
                pswpModule: PhotoSwipe,
                loop: false,
                bgOpacity: 0.95
            });
            lightbox.init();

            function updateMainImage(index) {
                const img = imagens[index];
                if (!img) return;
                
                mainImage.classList.add('loading');
                mainImage.src = img.src;
                imageInfo.textContent = img.title || '';
                
                mainImage.onload = () => mainImage.classList.remove('loading');
                mainImage.onerror = () => mainImage.classList.remove('loading');
                
                swiper.slideTo(index);
            }

            lightbox.on('change', () => {
                if (lightbox.pswp) {
                    const idx = lightbox.pswp.currIndex;
                    updateMainImage(idx);
                }
            });

            containerThumbs.addEventListener('click', (e) => {
                const slide = e.target.closest('.swiper-slide');
                if (!slide) return;
                const idx = parseInt(slide.querySelector('img').getAttribute('data-index'));
                updateMainImage(idx);
                lightbox.loadAndOpen(idx);
            });

            setTimeout(() => {
                updateMainImage(indexInicial);
                const allSlides = containerThumbs.querySelectorAll('.swiper-slide');
                if (allSlides[indexInicial]) {
                    allSlides[indexInicial].click();
                }
            }, 200);
        }
    </script>
</body>
</html>
